name: ci

on: [push, pull_request]

jobs:
  ci:
    # Set up operating system
    runs-on: ubuntu-latest

    # Define job steps
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Check-out repository
        uses: actions/checkout@v3

      - name: Install poetry
        uses: snok/install-poetry@v1

      - name: Install package
        run: poetry install
      
      # Install Jupyter and register the kernel
      - name: Install Jupyter and register kernel
        run: |
          poetry run pip install jupyter
          poetry run python -m ipykernel install --user --name=sgfixedincome_pkg

      - name: Test with pytest
        run: poetry run pytest tests/ --cov=sgfixedincome_pkg --cov-report=xml

      - name: Use Codecov to track coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml # coverage report

      - name: Generate coverage badge data
        id: coverage
        run: |
          COVERAGE=$(poetry run python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(root.attrib['line-rate'])")
          echo "coverage=$(awk "BEGIN {print $COVERAGE * 100}")" >> $GITHUB_ENV
  
      - name: Update Shields.io badge
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const badge = {
              schemaVersion: 1,
              label: 'coverage',
              message: `${process.env.coverage}%`,
              color: 'brightgreen'
            };
            fs.writeFileSync('badge.json', JSON.stringify(badge, null, 2));
            console.log('Badge generated:', badge);
  
      - name: Commit badge
        uses: EndBug/add-and-commit@v9
        with:
          add: badge.json
          message: "Update coverage badge"
          push: true

      - name: Build documentation
        run: poetry run make html --directory docs/
